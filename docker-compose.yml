services:
  postgres:
    image: postgres:16-alpine
    container_name: peaksy-postgres
    environment:
      POSTGRES_USER: peaksy
      POSTGRES_PASSWORD: peaksy_dev
      POSTGRES_DB: peaksy
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peaksy"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peaksy-api
    environment:
      DATABASE_URL: postgresql://peaksy:peaksy_dev@postgres:5432/peaksy
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    command: npm run dev

volumes:
  postgres_data:

