# https://docs.railway.com/deploy/config-as-code
# Na UI da Railway: New Project → Deploy from GitHub → escolher este repositório.
# Adicionar PostgreSQL e definir as variáveis em RAILWAY.md

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
